version: '3.8'

services:
  gitmatch:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: always
    environment:
      - NODE_ENV=production
    labels:
      - "coolify.managed=true"
      - "coolify.type=service"
      - "coolify.name=gitmatch"
      - "coolify.description=GitMatch PWA - Swipe to Discover Repos"
