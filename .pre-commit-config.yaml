repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: npm run lint
        language: system
        types: [ts, tsx]
        pass_filenames: false

      - id: typecheck
        name: typecheck
        entry: npm run typecheck
        language: system
        pass_filenames: false

      - id: test
        name: test
        entry: npm run test
        language: system
        pass_filenames: false
